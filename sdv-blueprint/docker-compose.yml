# Eclipse SDV Blueprint — Docker Compose
# Brings up the full demo stack in one command.
#
# Prerequisites:
#   1. Build the aos-edge-toolchain image:
#        cd aos-edge-toolchain && docker build -t aos-edge-toolchain:latest .
#   2. Place your SP certificate at ~/.aos/security/aos-user-sp.p12
#
# Usage:
#   cd sdv-blueprint
#   docker compose up            # foreground (see all logs interleaved)
#   docker compose up -d         # background
#   docker compose logs -f       # tail logs
#   docker compose down          # stop everything

services:

  # ── KUKSA Databrokers ──────────────────────────────────────────────

  kuksa-hpc:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:latest
    container_name: kuksa-hpc
    network_mode: host
    command: ["--insecure", "--port", "55555"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grpc_health_probe -addr=:55555 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  kuksa-zonal:
    image: ghcr.io/eclipse-kuksa/kuksa-databroker:latest
    container_name: kuksa-zonal
    network_mode: host
    command: ["--insecure", "--port", "55556"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grpc_health_probe -addr=:55556 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Python services ────────────────────────────────────────────────

  kuksa-bridge:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: kuksa-bridge
    network_mode: host
    environment:
      - ZONAL_KUKSA_ADDR=localhost:55556
      - HPC_KUKSA_ADDR=localhost:55555
    command: ["python3", "/app/kuksa-sync/kuksa-bridge.py"]
    depends_on:
      kuksa-hpc:
        condition: service_started
      kuksa-zonal:
        condition: service_started
    restart: unless-stopped

  end-simulator:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: end-simulator
    network_mode: host
    environment:
      - KUKSA_ADDR=localhost:55556
      - PUBLISH_INTERVAL=2
    command: ["python3", "/app/end-simulator/simulator.py"]
    depends_on:
      kuksa-zonal:
        condition: service_started
    restart: unless-stopped

  # ── Broadcaster with signal relay ──────────────────────────────────

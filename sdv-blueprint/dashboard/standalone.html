<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDV Blueprint — Live Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    #sdv-nav { display: flex; align-items: center; gap: 24px; padding: 6px 20px; background: #0d1117; border-bottom: 1px solid #30363d; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }
    #sdv-nav .nav-brand { color: #58a6ff; font-weight: 700; font-size: 14px; text-decoration: none; }
    #sdv-nav a { color: #8b949e; text-decoration: none; padding: 4px 12px; border-radius: 4px; transition: all 0.15s; }
    #sdv-nav a:hover { color: #c9d1d9; background: #21262d; }
    #sdv-nav a.active { color: #f0f6fc; background: #1f6feb; }
    #root { width: 100%; height: calc(100% - 33px); }
  </style>
</head>
<body>
  <nav id="sdv-nav">
    <span class="nav-brand">SDV Blueprint</span>
    <a href="/dashboard" class="active">Live Dashboard</a>
    <a href="/deploy">Cloud Deployment</a>
  </nav>
  <div id="root"></div>
  <script src="standalone.js"></script>
</body>
</html>

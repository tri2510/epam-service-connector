publisher:
    author: "developer@example.com"
    company: "Example Corp"

build:
    os: linux
    arch: x86_64
    sign_pkcs12: aos-user-sp.p12
    symlinks: copy

publish:
    url: aoscloud.io
    service_uid: 242a46c7-f237-40e3-a37e-40529a39bf85
    tls_pkcs12: aos-user-sp.p12
    version: "1.0.9"

configuration:
    cmd: /signal-writer
    workingDir: '/'
    env:
        - "KUKSA_DATABROKER_ADDR=172.17.0.1:55556"
    state:
        filename: default_state.dat
        required: true
    instances:
        minInstances: 1
        priority: 0
    isResourceLimits: true
    requestedResources:
        cpu: 1000
        ram: 10MB
        storage: 5MB
        state: 512KB
    quotas:
        cpu: 1000
        mem: 10MB
        state: 512KB
        storage: 5MB

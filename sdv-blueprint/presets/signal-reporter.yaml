publisher:
    author: "developer@example.com"
    company: "Example Corp"

build:
    os: linux
    arch: x86_64
    sign_pkcs12: aos-user-sp.p12
    symlinks: copy

publish:
    url: aoscloud.io
    service_uid: a9b8c7d6-e5f4-3210-fedc-ba0987654321
    tls_pkcs12: aos-user-sp.p12
    version: "1.0.0"

configuration:
    cmd: /signal-reporter
    workingDir: '/'
    state:
        filename: default_state.dat
        required: true
    instances:
        minInstances: 1
        priority: 0
    isResourceLimits: true
    requestedResources:
        cpu: 2000
        ram: 50MB
        storage: 25MB
        state: 512KB
    quotas:
        cpu: 2000
        mem: 50MB
        state: 512KB
        storage: 25MB
